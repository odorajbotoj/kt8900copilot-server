<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>kt8900copilot client by BG4QBF</title>
    <script src="https://cdn.jsdelivr.net/npm/js-md5@0.8.3/build/md5.min.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
</head>

<body>
    <h1>kt8900copilot simple client by BG4QBF</h1>
    <div>
        <div>
            <label for="address">服务器: </label>
            <input id="address" type="text">
        </div>
        <div>
            <label for="username">用户名: </label>
            <input id="username" type="text">
        </div>
        <div>
            <label for="passkey">验证密钥: </label>
            <input id="passkey" type="password">
        </div>
        <div>
            <button id="start" onclick="startWs();">连接服务器</button>
            <button id="stop"
                onclick="if (ws && ws.readyState == WebSocket.OPEN) { ws.close(); ws = null; }">断开服务器</button>
        </div>
    </div>
    <div>
        <p><span>连接状态: </span><span id="wsstat">连接断开</span></p>
    </div>
    <div id="onconn" hidden>
        <div>
            <p><span>数据来源: </span><span id="datafrom"></span></p>
            <p><span>数据状态: </span><span id="datastat"></span></p>
        </div>
        <div>
            <div>
                <button
                    onclick="document.querySelectorAll('.hidable').forEach(e => e.hidden = true); document.getElementById('div-conf').hidden = false;">配置</button>
                <button
                    onclick="document.querySelectorAll('.hidable').forEach(e => e.hidden = true); document.getElementById('div-play').hidden = false;">预录制</button>
                <button
                    onclick="document.querySelectorAll('.hidable').forEach(e => e.hidden = true); document.getElementById('div-aprs').hidden = false;">APRS</button>
                <button
                    onclick="document.querySelectorAll('.hidable').forEach(e => e.hidden = true); document.getElementById('div-reset').hidden = false;">重启</button>
                <button
                    onclick="document.querySelectorAll('.hidable').forEach(e => e.hidden = true); document.getElementById('div-ptt').hidden = false;">PTT</button>
            </div>
            <hr>
            <div hidden class="hidable" id="div-conf">
                <label for="setconf">配置项: </label>
                <input id="setconf" type="text">
                <button onclick="setconf();">更新配置</button>
            </div>
            <div hidden class="hidable" id="div-play">
                <label for="play">预录制文件: </label>
                <textarea id="play"></textarea>
                <br>
                <button onclick="play();">播放声音</button>
            </div>
            <div hidden class="hidable" id="div-aprs">
                <div>
                    <label for="tocall">TO CALL:</label>
                    <input type="text" id="tocall">
                    <input type="number" min="0" max="15" id="tocall-ssid">
                </div>
                <br>
                <div>
                    <label for="fromcall">FROM CALL:</label>
                    <input type="text" id="fromcall">
                    <input type="number" min="0" max="15" id="fromcall-ssid">
                </div>
                <br>
                <div>
                    <label for="path1">PATH 1:</label>
                    <input type="text" id="path1">
                    <input type="number" min="0" max="15" id="path1-ssid">
                    <br>
                    <label for="path2">PATH 2:</label>
                    <input type="text" id="path2">
                    <input type="number" min="0" max="15" id="path2-ssid">
                    <br>
                    <label for="path3">PATH 3:</label>
                    <input type="text" id="path3">
                    <input type="number" min="0" max="15" id="path3-ssid">
                    <br>
                    <label for="path4">PATH 4:</label>
                    <input type="text" id="path4">
                    <input type="number" min="0" max="15" id="path4-ssid">
                    <br>
                    <label for="path5">PATH 5:</label>
                    <input type="text" id="path5">
                    <input type="number" min="0" max="15" id="path5-ssid">
                    <br>
                    <label for="path6">PATH 6:</label>
                    <input type="text" id="path6">
                    <input type="number" min="0" max="15" id="path6-ssid">
                    <br>
                    <label for="path7">PATH 7:</label>
                    <input type="text" id="path7">
                    <input type="number" min="0" max="15" id="path7-ssid">
                    <br>
                    <label for="path8">PATH 8:</label>
                    <input type="text" id="path8">
                    <input type="number" min="0" max="15" id="path8-ssid">
                </div>
                <br>
                <div>
                    <label for="message">MESSAGE:</label>
                    <textarea id="message"></textarea>
                </div>
                <br>
                <div>
                    <button onclick="aprs();">SEND APRS</button>
                </div>
            </div>
            <div hidden class="hidable" id="div-reset">
                <button
                    onclick="if (ws && ws.readyState == WebSocket.OPEN) ws.send(Uint8Array.from([0x16, 0x00, 0x00]));">重启ESP32</button>
            </div>
            <div class="hidable" id="div-ptt">
                <label for="autoaprs">松开PTT自动发射APRS</label>
                <input type="checkbox" id="autoaprs">
                <br>
                <button id="ptt" onclick="ptt(!pttStat);" style="width: 10dvw; height: 10dvh;">单击发射</button>
            </div>
            <hr>
        </div>
    </div>
    <div id="outputs"></div>
    <script id="pcm-player-js" type="text">
        class PCMPlayer extends AudioWorkletProcessor { // g by chatgpt
            constructor() {
                super();
                this.queue = [];
                this.offset = 0;
                this.buffered = 0;
                this.started = false;
                this.startThreshold = 16000 * 0.18; // 180ms 启动缓冲
                this.port.onmessage = e => {
                    this.queue.push(e.data);
                    this.buffered += e.data.length;
                };
            }
            process(inputs, outputs) {
                const output = outputs[0][0];
                // 启动阶段
                if (!this.started) {
                    if (this.buffered < this.startThreshold) {
                        output.fill(0);
                        return true;
                    }
                    this.started = true;
                }
                for (let i = 0; i < output.length; i++) {
                    if (!this.queue.length) {
                        // 真正耗尽才重置
                        this.started = false;
                        output.fill(0);
                        return true;
                    }
                    const current = this.queue[0];
                    output[i] = current[this.offset++];
                    this.buffered--;
                    if (this.offset >= current.length) {
                        this.queue.shift();
                        this.offset = 0;
                    }
                }
                return true;
            }
        }
        registerProcessor("pcm-player", PCMPlayer);
    </script>
    <script id="pcm-capture-js" type="text">
        class PCMCapture extends AudioWorkletProcessor {
            constructor() {
                super();
                this.ptt = false;
                this.samplerate = 0;
                this.buffersize = 512;
                this.ringbuffer = new Int16Array(this.buffersize * 2);
                this.writeindex = 0;
                this.startindex = 0;
                this.written = 0;
                this.port.onmessage = ev => {
                    if (ev.data.type === "ptt") {
                        this.ptt = ev.data.value;
                    }
                    if (ev.data.type === "samplerate") {
                        this.samplerate = ev.data.value + 0.0;
                    }
                };
            }
            process(inputs) {
                const inp = inputs[0];
                if (!inp.length) return true;
                if (!this.ptt) return true;
                const channel = inp[0];

                let nowIndex = 0;
                let step = this.samplerate / 16000.0;
                let outSize = Math.ceil(channel.length * 16000.0 / this.samplerate);
                for (let i = 0; i < outSize; i++) {
                    this.ringbuffer[this.writeindex] = Math.max(-1, Math.min(1, channel[Math.floor(nowIndex)])) * 32767;
                    this.writeindex = (this.writeindex + 1) % (this.buffersize * 2);
                    this.written++;
                    nowIndex += step;
                }

                if (this.written >= this.buffersize) {
                    const buffer = new ArrayBuffer(this.written * 2 + 3);
                    const view = new DataView(buffer);
                    view.setUint8(0, 0x71);
                    view.setUint16(1, this.written * 2, true);
                    let nw = 0;
                    for (let i = this.startindex; i != this.writeindex; i = (i + 1) % (this.buffersize * 2)) {
                        view.setInt16(nw * 2 + 3, this.ringbuffer[i], true);
                        nw++
                    }
                    this.port.postMessage({ "type": "buffer", "value": buffer });
                    this.startindex = this.writeindex;
                    this.written = 0;
                }

                return true;
            }
        }
        registerProcessor("pcm-capture", PCMCapture);
    </script>
    <script>
        var pttStat = false;
        var ws = null;
        const textEncoder = new TextEncoder();
        const textDecoder = new TextDecoder();

        const audioCtx = new AudioContext();
        var txNode = null;
        var rxNode = null;
        (async () => {
            await audioCtx.audioWorklet.addModule(
                URL.createObjectURL(new Blob([document.getElementById("pcm-player-js").innerText], { type: "application/javascript" }))
            );
            await audioCtx.audioWorklet.addModule(
                URL.createObjectURL(new Blob([document.getElementById("pcm-capture-js").innerText], { type: "application/javascript" }))
            );
            txNode = new AudioWorkletNode(
                audioCtx,
                "pcm-player",
            );
            rxNode = new AudioWorkletNode(
                audioCtx,
                "pcm-capture",
            );
            txNode.connect(audioCtx.destination);
            rxNode.port.postMessage({ "type": "samplerate", "value": audioCtx.sampleRate });
        })();
        var mediaStack, mediaSource;

        function setconf() {
            if (!ws || ws.readyState != WebSocket.OPEN) return;
            let s = textEncoder.encode(document.getElementById("setconf").value);
            let ab = new ArrayBuffer(s.length + 3);
            let u8a = new Uint8Array(ab);
            u8a[0] = 0x15;
            u8a[1] = s.length & 0xFF;
            u8a[2] = (s.length >> 8) & 0xFF;
            u8a.set(s, 3);
            if (ws && ws.readyState == WebSocket.OPEN) ws.send(u8a);
        }
        function play() {
            if (!ws || ws.readyState != WebSocket.OPEN) return;
            let py = pinyinPro.pinyin(document.getElementById("play").value, { toneType: "num", type: "array" });
            for (let i in py) {
                if (py[i] == "?") {
                    py[i] = "wd-cq";
                } else if (py[i] == "!") {
                    py[i] = "wd-73";
                } else if (py[i] == "(") {
                    py[i] = "wd-qsl1";
                } else if (py[i] == ")") {
                    py[i] = "wd-qsl2";
                } else if (py[i] == "^") {
                    py[i] = "wd-sat";
                } else if (py[i] == ":") {
                    py[i] = "wd-thisis";
                } else if (py[i] == "@") {
                    py[i] = "wd-qrz";
                } else if (py[i] == "$") {
                    py[i] = "wd-thankyou";
                } else if (py[i] == ",") {
                    py[i] = "mute-05";
                } else if (/^[a-z]$/.test(py[i])) {
                    py[i] = "pa-" + py[i];
                }
            }
            let s = textEncoder.encode(py.join("/"));
            let ab = new ArrayBuffer(s.length + 3);
            let u8a = new Uint8Array(ab);
            u8a[0] = 0x17;
            u8a[1] = s.length & 0xFF;
            u8a[2] = (s.length >> 8) & 0xFF;
            u8a.set(s, 3);
            if (ws && ws.readyState == WebSocket.OPEN) ws.send(u8a);
        }
        function aprs() {
            let a = [0x18, 0x00, 0x00, 0x02];
            // tocall check
            let c = document.getElementById("tocall").value.toUpperCase();
            if (c.length > 6) {
                alert("bad tocall");
                return;
            }
            let ssid = parseInt(document.getElementById("tocall-ssid").value);
            if (ssid < 0 || ssid > 15) {
                alert("bad tocall ssid");
                return;
            }
            a.push(0x11);
            for (let i = 0; i < 6; i++) {
                if (i < c.length) a.push(c.charCodeAt(i));
                else a.push(0x20);
            }
            a.push(ssid);
            // fromcall check
            c = document.getElementById("fromcall").value.toUpperCase();
            if (c.length > 6) {
                alert("bad fromcall");
                return;
            }
            ssid = parseInt(document.getElementById("fromcall-ssid").value);
            if (ssid < 0 || ssid > 15) {
                alert("bad fromcall ssid");
                return
            }
            a.push(0x12);
            for (let i = 0; i < 6; i++) {
                if (i < c.length) a.push(c.charCodeAt(i));
                else a.push(0x20);
            }
            a.push(ssid);
            // path check
            for (let p_i = 1; p_i <= 8; p_i++) {
                c = document.getElementById(`path${p_i}`).value.toUpperCase();
                if (c != "") {
                    if (c.length > 6) {
                        alert(`bad path${p_i}`);
                        return;
                    }
                    ssid = parseInt(document.getElementById(`path${p_i}-ssid`).value);
                    if (ssid < 0 || ssid > 15) {
                        alert(`bad path${p_i} ssid`);
                        return;
                    }
                    a.push(0x13);
                    for (let i = 0; i < 6; i++) {
                        if (i < c.length) a.push(c.charCodeAt(i));
                        else a.push(0x20);
                    }
                    a.push(ssid);
                }
            }
            // push msg
            a.push(0x14);
            let m = document.getElementById("message").value;
            for (let i in m) { a.push(m.charCodeAt(i)); }
            a[1] = (a.length - 3) & 0xFF;
            a[2] = ((a.length - 3) >> 8) & 0xFF;
            if (ws && ws.readyState == WebSocket.OPEN) ws.send(Uint8Array.from(a));
        }

        var rxCache = [];
        var rxLen = 0;
        function pushAudio(buf) {
            rxCache.push(buf);
            rxLen += buf.length;
            if (rxLen >= audioCtx.sampleRate * 0.1) {
                const merged = new Float32Array(rxLen);
                let off = 0;
                for (let b of rxCache) {
                    merged.set(b, off);
                    off += b.length;
                }
                txNode.port.postMessage(merged);
                rxCache = [];
                rxLen = 0;
            }
        }

        function wsOnMessage(event) {
            let d = new Uint8Array(event.data);
            switch (d[0]) {
                case 0x01: // verify
                    let ab1 = textEncoder.encode(document.getElementById("username").value + ":");
                    let ab2 = textEncoder.encode(":" + document.getElementById("passkey").value);
                    let ab = new ArrayBuffer(ab1.length + ab2.length + d.length - 3);
                    let u8a = new Uint8Array(ab);
                    u8a.set(ab1);
                    u8a.set(d.slice(3), ab1.length);
                    u8a.set(ab2, ab1.length + d.length - 3);
                    let md5RstStr = md5(u8a);
                    let md5RstBuf = new ArrayBuffer(16);
                    let md5Rst = new Uint8Array(md5RstBuf);
                    for (let i = 0; i < 16; i++) {
                        md5Rst[i] = parseInt(md5RstStr.slice(2 * i, 2 * i + 2), 16);
                    }
                    if (ws && ws.readyState == WebSocket.OPEN) ws.send(md5Rst);
                    return;
                case 0x02: // refused
                    ws.close();
                    document.getElementById("wsstat").innerText = "连接断开";
                    alert("server refused the connection.");
                    return;
                case 0x03: // busy
                    ws.close();
                    document.getElementById("wsstat").innerText = "连接断开";
                    alert("server returned: the connection is busy. please wait a minute");
                    return;
                case 0x04: // verified
                    let pVerified = document.createElement("p");
                    pVerified.innerText = `${Date().toLocaleString()} 连接已验证.`;
                    document.getElementById("outputs").prepend(pVerified);
                    return;
                case 0x13: // pcm begin
                    document.getElementById("datastat").innerText = "接收音频";
                    return;
                case 0x14: // pcm end
                    document.getElementById("datafrom").innerText = "";
                    document.getElementById("datastat").innerText = "接收音频完成";
                    return;
                case 0x31: // message
                    let pMsg = document.createElement("p");
                    pMsg.innerText = `${Date().toLocaleString()} message: ${textDecoder.decode(d.slice(3))}`;
                    document.getElementById("outputs").prepend(pMsg);
                    return;
                case 0x32: // stat set config ok
                    let pStatSetConf = document.createElement("p");
                    pStatSetConf.innerText = `${Date().toLocaleString()} status: set config ok.`;
                    document.getElementById("outputs").prepend(pStatSetConf);
                    return;
                case 0x33: // stat set config error
                    let pStatErrSetConf = document.createElement("p");
                    pStatErrSetConf.innerText = `${Date().toLocaleString()} get error: failed to set config.`;
                    document.getElementById("outputs").prepend(pStatErrSetConf);
                    return;
                case 0x34: // stat set config error
                    let pStatErrCamDisabled = document.createElement("p");
                    pStatErrCamDisabled.innerText = `${Date().toLocaleString()} get error: camera is not enabled.`;
                    document.getElementById("outputs").prepend(pStatErrCamDisabled);
                    return;
                case 0x35: // play ok
                    let pStatPlay = document.createElement("p");
                    pStatPlay.innerText = `${Date().toLocaleString()} status: play sounds ok.`;
                    document.getElementById("outputs").prepend(pStatPlay);
                    return;
                case 0x36: // play error
                    let pStatErrPlay = document.createElement("p");
                    pStatErrPlay.innerText = `${Date().toLocaleString()} get error: failed to play sounds.`;
                    document.getElementById("outputs").prepend(pStatErrPlay);
                    return;
                case 0x37: // afsk ok
                    let pStatAFSK = document.createElement("p");
                    pStatAFSK.innerText = `${Date().toLocaleString()} status: afsk send ok.`;
                    document.getElementById("outputs").prepend(pStatAFSK);
                    return;
                case 0x38: // afsk error
                    let pStatErrAFSK = document.createElement("p");
                    pStatErrAFSK.innerText = `${Date().toLocaleString()} get error: failed to send afsk.`;
                    document.getElementById("outputs").prepend(pStatErrAFSK);
                    return;
                case 0x51: // from
                    document.getElementById("datafrom").innerText = textDecoder.decode(d.slice(3));
                    return;
                case 0x52: // online
                    let pOnline = document.createElement("p");
                    pOnline.innerText = `${Date().toLocaleString()} client online: ${textDecoder.decode(d.slice(3))}`;
                    document.getElementById("outputs").prepend(pOnline);
                    return;
                case 0x53: // offline
                    let pOffline = document.createElement("p");
                    pOffline.innerText = `${Date().toLocaleString()} client offline: ${textDecoder.decode(d.slice(3))}`;
                    document.getElementById("outputs").prepend(pOffline);
                    return;
                case 0x71: // pcm data
                    const inputSamples = (d.length - 3) / 2;
                    const view = new DataView(d.buffer, d.byteOffset + 3, inputSamples * 2);
                    const ratio = 16000 / audioCtx.sampleRate;
                    const outLength = Math.floor(inputSamples / ratio);
                    const out = new Float32Array(outLength);
                    let pos = 0;
                    for (let i = 0; i < outLength; i++) { // 重采样
                        const idx = Math.floor(pos);
                        const frac = pos - idx;
                        const s1 = view.getInt16(idx * 2, true) / 32768;
                        const s2 = (idx + 1 < inputSamples)
                            ? view.getInt16((idx + 1) * 2, true) / 32768
                            : s1;
                        out[i] = s1 + (s2 - s1) * frac;
                        pos += ratio;
                    }
                    pushAudio(out);
                    return;
                default:
                    console.log("unhandled: ", d[0]);
                    return;
            }
        }

        function startWs() {
            if (ws && ws.readyState == WebSocket.OPEN) return;
            try {
                ws = new WebSocket(document.getElementById("address").value);
            } catch (e) {
                alert("ws connect error: " + e.message);
                return;
            }
            document.getElementById('onconn').hidden = false;
            ws.binaryType = "arraybuffer";
            ws.onerror = (e) => {
                document.getElementById("wsstat").innerText = "连接断开";
                alert("ws error: " + e);
                ws.close();
                ws = null;
            }
            ws.onclose = () => {
                document.getElementById("wsstat").innerText = "连接断开";
                document.getElementById("outputs").innerText = "";
                document.getElementById('onconn').hidden = true;
                alert("ws connection closed.");
                ws = null;
            }
            ws.onmessage = wsOnMessage;
            ws.onopen = async () => {
                await audioCtx.resume();
                document.getElementById("wsstat").innerText = "已连接";
                if (ws && ws.readyState == WebSocket.OPEN) ws.send(textEncoder.encode(document.getElementById("username").value));
            }
        }

        function ptt(stat) {
            pttStat = stat;
            if (rxNode) {
                rxNode.port.postMessage({
                    type: "ptt",
                    value: stat
                });
            }
            if (stat) {
                // ptt on
                if (ws && ws.readyState == WebSocket.OPEN) ws.send(Uint8Array.from([0x11, 0x00, 0x00]));
                document.getElementById("datastat").innerText = "发送音频";
                document.getElementById("ptt").innerText = "单击停止";
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then((stream) => {
                        mediaStack = stream
                        mediaSource = audioCtx.createMediaStreamSource(stream)
                        mediaSource.connect(rxNode);
                        rxNode.port.onmessage = (ev) => {
                            if (ev.data.type == "buffer" && ws && ws.readyState === 1) { ws.send(ev.data.value); }
                        };
                    })
                    .catch((err) => { alert('media error: ' + err.message); });
            } else {
                // ptt off
                if (ws && ws.readyState == WebSocket.OPEN) ws.send(Uint8Array.from([0x12, 0x00, 0x00]));
                document.getElementById("datastat").innerText = "发送音频完成";
                document.getElementById("ptt").innerText = "单击发射";
                if (mediaStack) mediaStack.getTracks()[0].stop()
                if (document.getElementById("autoaprs").checked) aprs();
            }
        }
    </script>
</body>

</html>
